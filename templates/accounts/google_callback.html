{% extends "base.html" %}
{% block splash %}{% endblock %}
{% block title %}Signing in — Glass{% endblock %}
{% block content %}
<div class="empty-state">
    <div id="status">Signing in...</div>
    <div id="error" class="muted mt-1" style="display:none"></div>
</div>
<script>
(function() {
    var hash = window.location.hash.substring(1);
    var params = new URLSearchParams(hash);
    var accessToken = params.get('access_token');

    if (!accessToken) {
        // Also check query string as fallback
        var query = new URLSearchParams(window.location.search);
        accessToken = query.get('access_token');
    }

    if (!accessToken) {
        document.getElementById('status').textContent = 'Sign-in failed.';
        document.getElementById('error').style.display = 'block';
        document.getElementById('error').innerHTML = 'No token received from Google. <a href="/accounts/dashboard/" style="text-decoration:underline">Try again</a>';
        return;
    }

    function getCookie(name) {
        var value = "; " + document.cookie;
        var parts = value.split("; " + name + "=");
        if (parts.length === 2) return parts.pop().split(";").shift();
        return "";
    }

    fetch("/accounts/auth/google/complete/", {
        method: "POST",
        headers: {
            "Content-Type": "application/json",
            "X-CSRFToken": getCookie("csrftoken")
        },
        body: JSON.stringify({ access_token: accessToken })
    }).then(function(res) {
        if (res.ok) {
            window.location.href = "/accounts/dashboard/";
            return;
        }
        return res.json().then(function(data) {
            document.getElementById('status').textContent = 'Sign-in failed.';
            document.getElementById('error').style.display = 'block';
            document.getElementById('error').innerHTML = (data.error || 'Unknown error.') + ' <a href="/accounts/dashboard/" style="text-decoration:underline">Try again</a>';
        });
    }).catch(function() {
        document.getElementById('status').textContent = 'Sign-in failed.';
        document.getElementById('error').style.display = 'block';
        document.getElementById('error').innerHTML = 'Network error. <a href="/accounts/dashboard/" style="text-decoration:underline">Try again</a>';
    });
})();
</script>
{% endblock %}
