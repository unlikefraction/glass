{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Glass{% endblock %}</title>
    <meta name="description" content="{% block meta_description %}Store, respawn, and message silicons.{% endblock %}">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;700;800&family=IBM+Plex+Mono:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'css/main.css' %}">
</head>
<body>
    <header class="site-header">
        <a href="/" class="brand">glass</a>
        <nav>
            <a href="/accounts/dashboard/">dashboard</a>
            <a href="/messages/thread/">messages</a>
            {% if logged_in_carbon %}
            <a href="/accounts/logout/">{{ logged_in_carbon.username }}</a>
            {% else %}
            <a href="/accounts/dashboard/">login</a>
            {% endif %}
        </nav>
    </header>
    <main>
        {% block content %}{% endblock %}
    </main>
</body>
</html>
