{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Glass{% endblock %}</title>
    <meta name="description" content="{% block meta_description %}Store, respawn, and message buds.{% endblock %}">
    <link rel="icon" href="{% static 'sf-new-logo-dark.svg' %}" type="image/svg+xml">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'css/main.css' %}">
    {% block head %}{% endblock %}
</head>
<body>
    {% block splash %}
    <div id="splash-screen" data-homepage>
        <canvas id="splash-canvas"></canvas>
    </div>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.19.0/matter.min.js"></script>
    <script src="{% static 'js/splash.js' %}"></script>
    {% endblock %}

    <header class="site-header">
        <a href="/" class="brand">glass</a>
        <nav>
            {% if logged_in_carbon %}
            <a href="/accounts/dashboard/">buds</a>
            <a href="/accounts/logout/">{{ logged_in_carbon.username }}</a>
            {% else %}
            <a href="/accounts/dashboard/">login</a>
            {% endif %}
        </nav>
    </header>
    <main>
        {% block content %}{% endblock %}
    </main>
</body>
</html>
